name: Run aksu-stock scripts

on:
  workflow_dispatch:

permissions:
  contents: write  # 允许 workflow 推送更改

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: |
          chmod +x create_aksu_stock.sh add_stage3.sh add_stage4.sh || true
          ls -la .

      - name: Run create_aksu_stock.sh
        run: |
          ./create_aksu_stock.sh

      - name: Run add_stage3.sh
        run: |
          ./add_stage3.sh

      - name: Run add_stage4.sh
        run: |
          ./add_stage4.sh

      - name: Commit & push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: feature/aksu-stock-skill
